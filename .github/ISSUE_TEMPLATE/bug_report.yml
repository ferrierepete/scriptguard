name: Bug Report
description: Report a problem with ScriptGuard
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue. Please fill out the sections below.
  - type: input
    id: version
    attributes:
      label: ScriptGuard Version
      description: What version of ScriptGuard are you running?
      placeholder: "e.g., 1.0.2"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: What version of Node.js are you using?
      placeholder: "e.g., 20.11.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Install scriptguard: `npm install -g scriptguard`
        2. Run: `scriptguard scan /path/to/project`
        3. See error...
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the relevant command output
      render: shell
  - type: textarea
    id: package
    attributes:
      label: Sample Package (optional)
      description: If this is about a specific package, paste the relevant `package.json` or script content
      render: json
